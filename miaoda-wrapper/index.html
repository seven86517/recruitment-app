<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房懂懂招聘系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
  .loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; font-family: 'Microsoft YaHei', sans-serif; color: #666;
  }
  .spinner {
    width: 40px; height: 40px; margin: 0 auto 16px;
    border: 3px solid #E50012; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>房懂懂招聘系统加载中...</div>
</div>
<script>
// Tunnel URL — updated by automation when tunnel restarts
var APP_URL = 'https://dfkco-125-34-216-70.run.pinggy-free.link';

(function() {
  var iframe = document.createElement('iframe');
  iframe.src = APP_URL;
  iframe.onload = function() {
    var loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
  };
  iframe.onerror = function() {
    var loading = document.getElementById('loading');
    if (loading) loading.innerHTML = '<div style="color:#E50012;font-size:16px;">⚠️ 服务暂不可用<br><small>请稍后刷新重试</small></div>';
  };
  document.body.appendChild(iframe);
})();
</script>
</body>
</html>
